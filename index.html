<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>18 anos — feito com carinho</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ============ TOKENS ============ */
  :root{
    --black: #04060c;
    --navy-deep: #070c18;
    --navy: #0d1730;
    --navy-soft: #14224a;
    --blue: #2f5fdc;
    --blue-bright: #6f97ff;
    --blue-pale: #a9c0ff;
    --ink: #eef2fb;
    --muted: #8ea0c9;
    --flame: #ffb15e;
    --flame-core: #fff2cf;
    --gold: #e7c98c;
    --radius: 18px;
    --serif: 'Playfair Display', serif;
    --script: 'Cormorant Garamond', serif;
    --sans: 'Inter', sans-serif;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background: radial-gradient(ellipse at 50% -10%, var(--navy-soft), var(--navy-deep) 45%, var(--black) 100%);
    color: var(--ink);
    font-family: var(--sans);
    overflow: hidden;
    position: relative;
    -webkit-font-smoothing: antialiased;
  }

  #stars{ position:fixed; inset:0; z-index:0; display:block; }

  #app{
    position:relative;
    z-index:2;
    height:100dvh;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 90px 20px 110px;
  }

  #stage{
    width:100%;
    max-width: 760px;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .page{
    width:100%;
    animation: rise .7s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes rise{
    from{ opacity:0; transform: translateY(18px); }
    to{ opacity:1; transform: translateY(0); }
  }

  /* ============ NAV ============ */
  #topbar{
    position:fixed; top:0; left:0; right:0; z-index:5;
    display:flex; align-items:center; justify-content:center;
    padding: 22px 20px 10px;
    text-align:center;
    pointer-events:none;
  }
  #topbar .eyebrow{
    font-family: var(--script);
    font-style:italic;
    letter-spacing:.04em;
    color: var(--blue-pale);
    font-size: 15px;
  }

  #navbar{
    position:fixed; bottom:0; left:0; right:0; z-index:5;
    display:flex; flex-direction:column; align-items:center; gap:10px;
    padding: 14px 16px 20px;
    background: linear-gradient(to top, rgba(4,6,12,.9), transparent);
  }
  .progress-track{
    width:min(420px, 90vw); height:3px; border-radius:3px;
    background: rgba(255,255,255,.08); overflow:hidden;
  }
  .progress-fill{
    height:100%; background: linear-gradient(90deg, var(--blue), var(--blue-bright));
    transition: width .5s ease;
  }
  #navcontrols{ display:flex; align-items:center; gap:22px; }
  .nav-btn{
    width:44px; height:44px; border-radius:50%;
    border:1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.03);
    color: var(--ink);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:18px;
    transition: background .2s, transform .15s, border-color .2s;
  }
  .nav-btn:hover{ background: rgba(111,151,255,.15); border-color: var(--blue-bright); }
  .nav-btn:active{ transform: scale(.92); }
  .nav-btn:disabled{ opacity:.25; cursor:default; }
  .nav-btn:focus-visible, button:focus-visible, [tabindex]:focus-visible{
    outline: 2px solid var(--blue-bright); outline-offset: 3px;
  }
  #counter{ font-size:13px; color: var(--muted); letter-spacing:.06em; min-width:64px; text-align:center; font-variant-numeric: tabular-nums;}

  /* ============ COVER PAGE ============ */
  .cover{ text-align:center; }
  .cover .eyebrow-line{
    font-family: var(--script); font-style:italic; color:var(--blue-pale);
    font-size:17px; margin-bottom:10px;
  }
  .cover h1{
    font-family: var(--serif);
    font-size: clamp(32px, 6vw, 52px);
    line-height:1.08;
    background: linear-gradient(180deg, #ffffff, var(--blue-pale));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    margin-bottom: 18px;
  }
  .cover-photo{
    width: 168px; height:168px; border-radius:50%;
    margin: 0 auto 22px;
    border: 3px solid var(--blue);
    box-shadow: 0 0 0 8px rgba(47,95,220,.12), 0 20px 50px rgba(0,0,0,.5);
    overflow:hidden;
    background: linear-gradient(140deg, var(--navy-soft), var(--navy));
    display:flex; align-items:center; justify-content:center;
    color: var(--muted); font-size:12px; padding:10px; text-align:center;
  }
  .cover-photo img{ width:100%; height:100%; object-fit:cover; display:block; }

  .cover p.msg{
    font-family: var(--script); font-size: 21px; line-height:1.6;
    color: var(--ink); max-width:520px; margin: 0 auto 30px;
  }

  /* Cake */
  .cake-wrap{ margin: 6px auto 4px; display:flex; flex-direction:column; align-items:center; }
  .candles{ display:flex; gap:14px; margin-bottom:-6px; z-index:2; }
  .candle{ width:8px; height:34px; border-radius:3px; background: linear-gradient(180deg, var(--gold), #b98f4a); position:relative; cursor:pointer; }
  .candle .flame{
    position:absolute; left:50%; top:-16px; transform:translateX(-50%);
    width:11px; height:16px; border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
    background: radial-gradient(circle at 50% 70%, var(--flame-core), var(--flame) 60%, transparent 80%);
    animation: flicker 1.4s ease-in-out infinite;
    filter: drop-shadow(0 0 6px var(--flame));
  }
  @keyframes flicker{
    0%,100%{ transform:translateX(-50%) scale(1) rotate(-2deg); }
    50%{ transform:translateX(-50%) scale(.9,1.08) rotate(3deg); }
  }
  .candle.out .flame{ display:none; }
  .candle.out::after{
    content:''; position:absolute; left:50%; top:-14px; transform:translateX(-50%);
    width:4px; height:14px; border-radius:2px; background: rgba(180,190,210,.4);
    animation: smoke 1s ease-out forwards;
  }
  @keyframes smoke{
    0%{ opacity:.7; transform: translateX(-50%) translateY(0) scaleX(1); }
    100%{ opacity:0; transform: translateX(-50%) translateY(-26px) scaleX(2.2); }
  }
  .cake{
    width: 230px; height:90px; border-radius: 14px 14px 30px 30px;
    background: linear-gradient(180deg, var(--navy-soft), var(--navy));
    border: 1px solid rgba(111,151,255,.25);
    position:relative; box-shadow: 0 18px 40px rgba(0,0,0,.5);
  }
  .cake::before{
    content:''; position:absolute; top:-8px; left:6px; right:6px; height:16px;
    border-radius: 10px; background: linear-gradient(180deg, var(--blue-bright), var(--blue));
  }
  .blow-hint{ font-size:13px; color: var(--muted); margin-top:20px; }
  #micBtn{
    margin-top:10px; padding:9px 18px; border-radius:30px; border:1px solid rgba(111,151,255,.35);
    background: rgba(111,151,255,.08); color: var(--blue-pale); font-family: var(--sans); font-size:13px;
    cursor:pointer; transition: background .2s;
  }
  #micBtn:hover{ background: rgba(111,151,255,.18); }
  .celebrate-msg{
    margin-top: 22px; font-family: var(--serif); font-size: 20px; color: var(--gold);
    opacity:0; transform: translateY(8px); transition: opacity .6s, transform .6s;
  }
  .celebrate-msg.show{ opacity:1; transform: translateY(0); }

  /* ============ CARTA (FLIP CARD) ============ */
  .carta-page{ display:flex; flex-direction:column; align-items:center; }
  .carta-label{
    font-family: var(--script); font-style:italic; color: var(--blue-pale);
    font-size:16px; margin-bottom: 22px; letter-spacing:.03em;
  }
  .card{
    width: min(380px, 88vw); height: 460px;
    perspective: 1400px; cursor:pointer;
  }
  .card-inner{
    position:relative; width:100%; height:100%;
    transition: transform .8s cubic-bezier(.2,.8,.2,1);
    transform-style: preserve-3d;
  }
  .card.open .card-inner{ transform: rotateY(180deg); }
  .card-face{
    position:absolute; inset:0; backface-visibility:hidden;
    border-radius: var(--radius);
    border: 1px solid rgba(111,151,255,.22);
    box-shadow: 0 20px 60px rgba(0,0,0,.55);
    padding: 28px;
    display:flex; flex-direction:column;
    overflow:hidden;
  }
  .card-front{
    padding:0;
    overflow:hidden;
    align-items:stretch; justify-content:flex-end; text-align:center;
  }
  .card-front-photo{
    position:absolute; inset:0;
    background: linear-gradient(140deg, var(--navy-soft), var(--navy));
  }
  .card-front-photo img{ width:100%; height:100%; object-fit:cover; display:block; }
  .card-front-photo.sem-foto{
    display:flex; align-items:center; justify-content:center;
    color: var(--muted); font-size:12px; padding:10px; text-align:center;
  }
  .card-front-overlay{
    position:relative; z-index:2;
    padding: 26px 24px 24px;
    display:flex; flex-direction:column; align-items:center; gap:8px;
    background: linear-gradient(to top, rgba(4,6,12,.92) 20%, rgba(4,6,12,.55) 60%, transparent 100%);
  }
  .card-front .ano{ font-family: var(--serif); font-size: 26px; color: var(--ink); }
  .card-front .toque{ font-size:12.5px; color: var(--muted); letter-spacing:.08em; text-transform:uppercase; }
  .card-front .de{ font-family: var(--script); font-style:italic; font-size:17px; color: var(--blue-pale); }

  .card-back{
    background: linear-gradient(165deg, #101c3a, #070c18);
    transform: rotateY(180deg);
    padding:0;
  }
  .card-back-inner{
    width:100%; height:100%;
    padding: 28px;
    overflow-y:auto;
    -webkit-overflow-scrolling: touch;
    touch-action: pan-y;
    display:flex; flex-direction:column; align-items:stretch;
    gap: 14px;
  }
  .card-back .texto{
    font-family: var(--script); font-size:18px; line-height:1.55; color: var(--ink);
    white-space:pre-line; flex:none;
  }
  .card-back .assinatura{
    font-family: var(--serif); font-size:16px; color: var(--blue-pale); text-align:right; padding-top:6px;
  }
  .card-back .fechar{
    align-self:center; font-size:11.5px; color: var(--muted); letter-spacing:.08em; text-transform:uppercase;
    margin-top:4px;
  }

  /* scrollbar discreta dentro da carta */
  .card-back-inner::-webkit-scrollbar{ width:5px; }
  .card-back-inner::-webkit-scrollbar-thumb{ background: rgba(111,151,255,.3); border-radius:4px; }

  @media (max-width: 480px){
    .card{ height: 74vh; }
    .cover-photo{ width:130px; height:130px; }
    .cover h1{ font-size: 30px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: .001s !important; transition-duration: .001s !important; }
  }
</style>
</head>

/* ========================= NÃO PRECISA MEXER DAQUI PRA BAIXO ========================= */

const totalPages = 1 + dados.cartas.length; // capa + cartas
let current = 0;
const stage = document.getElementById('stage');
const counterEl = document.getElementById('counter');
const progressFill = document.getElementById('progressFill');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

function fotoTag(src, alt){
  return `<img src="${src}" alt="${alt}" onerror="this.parentElement.classList.add('sem-foto'); this.remove(); this.parentElement.insertAdjacentHTML('beforeend','<span>📷 foto de ${alt}</span>')">`;
}

function renderCover(){
  const c = dados.capa;
  return `
  <div class="page cover">
    <div class="eyebrow-line">18 páginas, uma para cada ano da sua vida</div>
    <h1>Feliz 18 anos, ${c.nome}</h1>
    <div class="cover-photo">${fotoTag(c.foto, c.nome)}</div>
    <p class="msg">${c.mensagem}</p>

    <div class="cake-wrap">
      <div class="candles" id="candles"></div>
      <div class="cake"></div>
      <div class="blow-hint">Assopre as velinhas — ou toque em cada uma delas</div>
      <button id="micBtn" type="button">🎤 Assoprar pelo microfone</button>
      <div class="celebrate-msg" id="celebrateMsg">🎉 Parabéns! Que esse novo ano seja lindo do seu jeito. 🎉</div>
    </div>
  </div>`;
}

function renderCarta(i){
  const carta = dados.cartas[i];
  return `
  <div class="page carta-page">
    <div class="carta-label">Ano ${i+1} de 17</div>
    <div class="card" id="card-${i}">
      <div class="card-inner">
        <div class="card-face card-front">
          <div class="card-front-photo">${fotoTag(carta.foto, 'ano ' + (i+1))}</div>
          <div class="card-front-overlay">
            <div class="ano">Ano ${i+1}</div>
            <div class="de">uma carta de ${carta.de}</div>
            <div class="toque">toque para abrir</div>
          </div>
        </div>
        <div class="card-face card-back">
          <div class="card-back-inner">
            <div class="texto">${carta.texto}</div>
            <div class="assinatura">— ${carta.de}</div>
            <div class="fechar">toque para fechar</div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function render(){
  if(current === 0){
    stage.innerHTML = renderCover();
    setupCake();
  } else {
    const i = current - 1;
    stage.innerHTML = renderCarta(i);
    const card = document.getElementById('card-' + i);
    card.addEventListener('click', () => card.classList.toggle('open'));
  }
  counterEl.textContent = `${current+1} / ${totalPages}`;
  progressFill.style.width = `${((current+1)/totalPages)*100}%`;
  prevBtn.disabled = current === 0;
  nextBtn.disabled = current === totalPages - 1;
}

function go(delta){
  const next = current + delta;
  if(next < 0 || next > totalPages - 1) return;
  current = next;
  render();
}

prevBtn.addEventListener('click', () => go(-1));
nextBtn.addEventListener('click', () => go(1));
document.addEventListener('keydown', (e) => {
  if(e.key === 'ArrowRight') go(1);
  if(e.key === 'ArrowLeft') go(-1);
});

// swipe simples pra celular
let touchX = null;
document.addEventListener('touchstart', e => touchX = e.touches[0].clientX, {passive:true});
document.addEventListener('touchend', e => {
  if(touchX === null) return;
  const diff = e.changedTouches[0].clientX - touchX;
  if(Math.abs(diff) > 50) go(diff < 0 ? 1 : -1);
  touchX = null;
});

/* ---------- Velinhas ---------- */
function setupCake(){
  const wrap = document.getElementById('candles');
  const total = 5;
  wrap.innerHTML = '';
  for(let i=0;i<total;i++){
    const c = document.createElement('div');
    c.className = 'candle';
    c.innerHTML = '<span class="flame"></span>';
    c.addEventListener('click', () => blowOne(c));
    wrap.appendChild(c);
  }
  document.getElementById('micBtn').addEventListener('click', tryMic);
}

function blowOne(candleEl){
  if(candleEl.classList.contains('out')) return;
  candleEl.classList.add('out');
  checkAllOut();
}

function checkAllOut(){
  const lit = document.querySelectorAll('.candle:not(.out)');
  if(lit.length === 0){
    const msg = document.getElementById('celebrateMsg');
    if(msg) msg.classList.add('show');
    confetti();
  }
}

let micActive = false;
async function tryMic(){
  if(micActive) return;
  const btn = document.getElementById('micBtn');
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    micActive = true;
    btn.textContent = '🎤 Ouvindo... pode assoprar!';
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const source = ctx.createMediaStreamSource(stream);
    const analyser = ctx.createAnalyser();
    analyser.fftSize = 512;
    source.connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);
    let cooldown = false;

    function loop(){
      const litCandles = document.querySelectorAll('.candle:not(.out)');
      if(litCandles.length === 0){
        stream.getTracks().forEach(t => t.stop());
        ctx.close();
        btn.style.display = 'none';
        return;
      }
      analyser.getByteFrequencyData(data);
      const avg = data.reduce((a,b)=>a+b,0) / data.length;
      if(avg > 32 && !cooldown){
        cooldown = true;
        blowOne(litCandles[0]);
        setTimeout(() => cooldown = false, 500);
      }
      requestAnimationFrame(loop);
    }
    loop();
  }catch(err){
    btn.textContent = '🎤 Sem acesso ao microfone — toque nas velinhas';
  }
}

/* ---------- Confete simples ---------- */
function confetti(){
  const colors = ['#6f97ff','#2f5fdc','#e7c98c','#eef2fb'];
  for(let i=0;i<60;i++){
    const p = document.createElement('div');
    const size = 5 + Math.random()*5;
    p.style.cssText = `
      position:fixed; z-index:20; top:-10px; left:${Math.random()*100}vw;
      width:${size}px; height:${size*0.6}px; background:${colors[i % colors.length]};
      opacity:.9; border-radius:2px; pointer-events:none;
      transform: rotate(${Math.random()*360}deg);
    `;
    document.body.appendChild(p);
    const fall = p.animate([
      { transform: `translateY(0) rotate(0deg)`, opacity: 1 },
      { transform: `translateY(${70+Math.random()*30}vh) rotate(${360+Math.random()*360}deg)`, opacity: 0 }
    ], { duration: 2200 + Math.random()*1200, easing: 'ease-in' });
    fall.onfinish = () => p.remove();
  }
}

/* ---------- Céu estrelado de fundo ---------- */
const canvas = document.getElementById('stars');
const ctx2d = canvas.getContext('2d');
let stars = [];
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const count = Math.floor((canvas.width * canvas.height) / 9000);
  stars = Array.from({length: count}, () => ({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*1.3 + .3,
    phase: Math.random()*Math.PI*2,
    speed: 0.01 + Math.random()*0.02
  }));
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function drawStars(t){
  ctx2d.clearRect(0,0,canvas.width,canvas.height);
  for(const s of stars){
    const tw = reduceMotion ? 0.7 : 0.5 + 0.5*Math.sin(t*s.speed + s.phase);
    ctx2d.beginPath();
    ctx2d.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx2d.fillStyle = `rgba(180,200,255,${0.15 + tw*0.55})`;
    ctx2d.fill();
  }
  if(!reduceMotion) requestAnimationFrame(drawStars);
}
requestAnimationFrame(drawStars);

render();
</script>
